x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-erpnext}:${CUSTOM_TAG:-latest}
  build:
    context: .
    target: backend

x-backend-defaults: &backend-defaults
  <<: *customizable_image
  volumes:
    - sites:/home/frappe/frappe-bench/sites

x-common-env: &common-env
  DB_HOST: mariadb
  DB_PORT: "3306"
  REDIS_CACHE: redis://redis-cache:6379
  REDIS_QUEUE: redis://redis-queue:6379
  SOCKETIO_PORT: "9000"

services:
  # ── Site Configurator (one-shot init) ─────────────────────
  configurator:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    restart: on-failure
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps/erpnext > /dev/null 2>&1 || exit 0;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache $$REDIS_CACHE;
        bench set-config -g redis_queue $$REDIS_QUEUE;
        bench set-config -g redis_socketio redis://redis-queue:6379;
    environment:
      <<: *common-env
    depends_on: {}

  # ── Frappe / ERPNext Backend ──────────────────────────────
  backend:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  # ── Nginx Frontend ────────────────────────────────────────
  frontend:
    <<: *backend-defaults
    command: nginx-entrypoint.sh
    ports:
      - "${HTTP_PORT:-8002}:8080"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-erpnext.localhost}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: "50m"
    depends_on:
      - backend
      - websocket

  # ── WebSocket (real-time updates) ─────────────────────────
  websocket:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── Background Workers ────────────────────────────────────
  queue-short:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    command: bench worker --queue short,default
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully

  queue-long:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    command: bench worker --queue long,default,short
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── Scheduler ─────────────────────────────────────────────
  scheduler:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    command: bench schedule
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully

  # ── MariaDB ───────────────────────────────────────────────
  mariadb:
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-erpnext}
      MYSQL_USER: ${DB_USER:-erpnext}
      MYSQL_PASSWORD: ${DB_PASSWORD:-erpnext}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (cache) ─────────────────────────────────────────
  redis-cache:
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    image: redis:7-alpine
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Redis (queue) ─────────────────────────────────────────
  redis-queue:
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    image: redis:7-alpine
    volumes:
      - redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Site Creator (one-shot — creates the site) ────────────
  create-site:
    <<: *backend-defaults
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=false"
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 60 mariadb:3306;
        bench new-site ${SITE_NAME:-erpnext.localhost}
          --mariadb-root-password ${DB_ROOT_PASSWORD:-changeme}
          --admin-password ${ADMIN_PASSWORD:-admin}
          --install-app erpnext
          --set-default
          || true;
    environment:
      <<: *common-env
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  sites:
